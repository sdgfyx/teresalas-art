    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 8rem 3rem 4rem 6rem; position: relative; overflow: hidden; }
    .hero::after { content: ''; position: absolute; right: -5%; top: 10%; width: 55%; height: 80%; background: radial-gradient(ellipse at center, var(--parchment) 0%, transparent 70%); opacity: 0.7; pointer-events: none; }
    .hero-ornament { font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.95rem; letter-spacing: 0.18em; color: var(--terracotta); text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 1s ease forwards 0.2s; }
    .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(3.5rem, 8vw, 7.5rem); font-weight: 400; line-height: 1.0; color: var(--umber); margin-bottom: 0.3rem; opacity: 0; animation: fadeUp 1s ease forwards 0.5s; }
    .hero h1 span { display: block; color: var(--terracotta); font-weight: 600; }
    .hero-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(1.1rem, 2vw, 1.5rem); color: var(--umber); opacity: 0; animation: fadeUp 1s ease forwards 0.8s; margin-top: 1.2rem; max-width: 480px; }
    .hero-divider { width: 80px; height: 1px; background: var(--terracotta); margin: 2rem 0; opacity: 0; animation: fadeUp 1s ease forwards 1s; }
    .hero-tagline { font-size: 1rem; letter-spacing: 0.08em; color: var(--umber); opacity: 0; animation: fadeUp 1s ease forwards 1.2s; max-width: 400px; font-style: italic; }
    .hero-scroll { position: absolute; bottom: 3rem; left: 6rem; display: flex; align-items: center; gap: 1rem; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--umber); opacity: 0; animation: fadeUp 1s ease forwards 1.6s; }
    .hero-scroll::before { content: ''; width: 40px; height: 1px; background: var(--terracotta); }
    .vertical-text { position: absolute; right: 3rem; top: 50%; transform: translateY(-50%) rotate(90deg); font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.35em; color: var(--umber); opacity: 0.25; text-transform: uppercase; white-space: nowrap; }

    /* SECTIONS */
    section { padding: 6rem 3rem; position: relative; }
    .section-label { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.35em; color: var(--terracotta); text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
    .section-label::after { content: ''; height: 1px; width: 40px; background: var(--terracotta); opacity: 0.5; }
    .section-title { font-family: 'Cinzel', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 400; color: var(--umber); line-height: 1.2; }

    /* BIOGRAPHY */
    .bio-section { background: var(--parchment); padding: 7rem 3rem; }
    .bio-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.6fr; gap: 6rem; align-items: start; }
    .bio-left { position: sticky; top: 8rem; }
    .bio-quote { font-family: 'IM Fell English', serif; font-style: italic; font-size: clamp(1.4rem, 2.5vw, 2rem); color: var(--umber); line-height: 1.5; margin-top: 2rem; padding-left: 1.5rem; border-left: 2px solid var(--terracotta); }
    .bio-text { font-size: 1.1rem; font-weight: 500; color: var(--ink); line-height: 1.9; }
    .bio-text p + p { margin-top: 1.5rem; }
    .bio-origin { margin-top: 2.5rem; padding: 1.5rem; border: 1px solid rgba(74, 47, 26, 0.2); background: rgba(245, 239, 228, 0.5); }
    .bio-origin-label { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.3em; color: var(--terracotta); text-transform: uppercase; margin-bottom: 0.5rem; }
    .bio-origin p { font-style: italic; font-size: 0.95rem; color: var(--umber); }

    /* DISCIPLINES */
    .disciplines-section { max-width: 1100px; margin: 0 auto; }
    .disciplines-grid { display: grid; grid-template-columns: repeat(3, 1fr); margin-top: 4rem; border: 1px solid rgba(74, 47, 26, 0.15); }
    .discipline-card { padding: 3rem 2.5rem; border-right: 1px solid rgba(74, 47, 26, 0.15); transition: background 0.4s; }
    .discipline-card:last-child { border-right: none; }
    .discipline-card:hover { background: var(--parchment); }
    .discipline-number { font-family: 'Cinzel', serif; font-size: 3.5rem; color: var(--terracotta); opacity: 0.18; line-height: 1; margin-bottom: 1rem; font-weight: 600; }
    .discipline-title { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--umber); margin-bottom: 1rem; letter-spacing: 0.05em; }
    .discipline-desc { font-size: 1rem; font-weight: 500; color: var(--ink); line-height: 1.8; }
    .discipline-works { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(74, 47, 26, 0.12); }
    .discipline-works-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--terracotta); text-transform: uppercase; margin-bottom: 0.8rem; }
    .discipline-works ul { list-style: none; font-style: italic; font-size: 0.95rem; color: var(--umber); }
    .discipline-works li { margin-bottom: 0.3rem; }
    .discipline-works li::before { content: '— '; opacity: 0.5; }

    /* LOGROS */
    .logros-section { background: var(--umber); color: var(--cream); padding: 7rem 3rem; }
    .logros-inner { max-width: 1100px; margin: 0 auto; }
    .logros-section .section-label { color: var(--ochre); }
    .logros-section .section-label::after { background: var(--ochre); }
    .logros-section .section-title { color: var(--cream); }
    .logros-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; margin-top: 4rem; }
    .logro-item { padding: 2.5rem 3rem; background: var(--umber); border: 1px solid rgba(245, 239, 228, 0.08); transition: background 0.3s; }
    .logro-item:hover { background: rgba(181, 83, 60, 0.2); }
    .logro-year { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.25em; color: var(--ochre); text-transform: uppercase; margin-bottom: 0.8rem; }
    .logro-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.25rem; color: var(--cream); margin-bottom: 0.5rem; line-height: 1.4; }
    .logro-desc { font-size: 1rem; color: var(--cream); opacity: 0.85; line-height: 1.7; }

    /* GALERÍA */
    .galeria-outer { max-width: 1100px; margin: 0 auto; }
    .galeria-filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; margin-bottom: 3rem; }
    .filter-btn { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.5rem 1.2rem; border: 1px solid rgba(74,47,26,0.25); background: transparent; color: var(--umber); cursor: pointer; transition: all 0.3s; }
    .filter-btn:hover, .filter-btn.active { background: var(--terracotta); color: var(--cream); border-color: var(--terracotta); }
    .galeria-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .galeria-item { aspect-ratio: 3/4; background: var(--parchment); border: 1px solid rgba(74, 47, 26, 0.15); overflow: hidden; position: relative; cursor: pointer; transition: transform 0.4s; }
    .galeria-item:hover { transform: translateY(-4px); }
    .galeria-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s; }
    .galeria-item:hover img { transform: scale(1.04); }
    .galeria-item-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(30,18,10,0.85) 0%, transparent 50%); opacity: 0; transition: opacity 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; }
    .galeria-item:hover .galeria-item-overlay { opacity: 1; }
    .galeria-item-tag { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--ochre); text-transform: uppercase; margin-bottom: 0.4rem; }
    .galeria-item-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.1rem; color: var(--cream); line-height: 1.3; }
    .galeria-item-desc { font-size: 0.8rem; color: var(--cream); opacity: 0.7; margin-top: 0.3rem; }

    /* LIGHTBOX */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(10,5,2,0.95); z-index: 500; justify-content: center; align-items: center; padding: 2rem; }
    .lightbox.open { display: flex; }
    .lightbox-inner { position: relative; max-width: 900px; width: 100%; }
    .lightbox img { width: 100%; max-height: 80vh; object-fit: contain; display: block; }
    .lightbox-caption { color: var(--cream); font-style: italic; text-align: center; margin-top: 1rem; font-size: 0.95rem; opacity: 0.8; }
    .lightbox-close { position: absolute; top: -2.5rem; right: 0; background: none; border: none; color: var(--cream); font-size: 1.8rem; cursor: pointer; opacity: 0.7; }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(245,239,228,0.15); border: none; color: var(--cream); font-size: 1.5rem; padding: 0.8rem 1.1rem; cursor: pointer; transition: background 0.3s; }
    .lightbox-prev { left: -3.5rem; }
    .lightbox-next { right: -3.5rem; }
    .lightbox-prev:hover, .lightbox-next:hover { background: rgba(245,239,228,0.3); }

    /* CONTACTO */
    .contacto-section { background: var(--parchment); padding: 7rem 3rem; text-align: center; }
    .contacto-inner { max-width: 600px; margin: 0 auto; }
    .contacto-section .section-label { justify-content: center; }
    .contacto-section .section-label::after { display: none; }
    .contacto-tagline { font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.4rem; color: var(--umber); margin: 1.5rem 0 3rem; line-height: 1.6; }
    .contacto-links { display: flex; justify-content: center; gap: 3rem; flex-wrap: wrap; }
    .contacto-link { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--umber); transition: color 0.3s; }
    .contacto-link:hover { color: var(--terracotta); }
    .contacto-link-icon { font-size: 1.5rem; }
    .contacto-link-label { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; }

    /* FOOTER */
    footer { background: var(--ink); color: var(--cream); padding: 2.5rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-name { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.7; }
    .footer-copy { font-size: 0.8rem; opacity: 0.4; font-style: italic; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .nav-toggle { display: flex; }
      .hero { padding: 7rem 1.5rem 4rem; }
      .hero-scroll { left: 1.5rem; }
      .vertical-text { display: none; }
      .bio-inner { grid-template-columns: 1fr; gap: 3rem; }
      .bio-left { position: static; }
      .disciplines-grid { grid-template-columns: 1fr; }
      .discipline-card { border-right: none; border-bottom: 1px solid rgba(74,47,26,0.15); }
      .logros-grid { grid-template-columns: 1fr; }
      .galeria-grid { grid-template-columns: repeat(2, 1fr); }
      .lightbox-prev { left: 0; }
      .lightbox-next { right: 0; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }

    @media (max-width: 480px) {
      .galeria-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="nav-drawer" id="navDrawer">
    <a href="#inicio" onclick="closeDrawer()">Inicio</a>
    <a href="#biografia" onclick="closeDrawer()">Biografía</a>
    <a href="#obra" onclick="closeDrawer()">Obra</a>
    <a href="#logros" onclick="closeDrawer()">Reconocimientos</a>
    <a href="#galeria" onclick="closeDrawer()">Galería</a>
    <a href="#contacto" onclick="closeDrawer()">Contacto</a>
  </div>

  <nav>
    <a href="#inicio" class="nav-logo" id="nav-logo-text">Tere Salas</a>
    <ul class="nav-links">
      <li><a href="#biografia">Biografía</a></li>
      <li><a href="#obra">Obra</a></li>
      <li><a href="#logros">Reconocimientos</a></li>
      <li><a href="#galeria">Galería</a></li>
      <li><a href="#contacto">Contacto</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <section id="inicio" class="hero">
    <p class="hero-ornament" id="hero-ornament"></p>
    <h1 id="hero-name"></h1>
    <div class="hero-divider"></div>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <p class="hero-tagline" id="hero-tagline"></p>
    <p class="hero-scroll" id="hero-scroll"></p>
    <span class="vertical-text" id="hero-origin"></span>
  </section>

  <section id="biografia" class="bio-section">
    <div class="bio-inner">
      <div class="bio-left reveal">
        <div class="section-label">Sobre la Artista</div>
        <h2 class="section-title">Una vida<br/>en el arte</h2>
        <blockquote class="bio-quote" id="bio-quote"></blockquote>
        <div class="bio-origin">
          <div class="bio-origin-label">Raíces</div>
          <p id="bio-origin-text"></p>
        </div>
      </div>
      <div class="bio-text reveal" id="bio-paragraphs"></div>
    </div>
  </section>

  <section id="obra">
    <div class="disciplines-section">
      <div class="reveal">
        <div class="section-label">Disciplinas</div>
        <h2 class="section-title">Su obra</h2>
      </div>
      <div class="disciplines-grid reveal" id="disciplines-grid"></div>
    </div>
  </section>

  <section id="logros" class="logros-section">
    <div class="logros-inner">
      <div class="reveal">
        <div class="section-label">Trayectoria</div>
        <h2 class="section-title">Reconocimientos<br/>y Exhibiciones</h2>
      </div>
      <div class="logros-grid reveal" id="logros-grid"></div>
    </div>
  </section>

  <section id="galeria">
    <div class="galeria-outer">
      <div class="reveal">
        <div class="section-label">Obras</div>
        <h2 class="section-title">Galería</h2>
      </div>
      <div class="galeria-filters reveal" id="galeria-filters"></div>
      <div class="galeria-grid reveal" id="galeria-grid"></div>
    </div>
  </section>

  <section id="contacto" class="contacto-section">
    <div class="contacto-inner reveal">
      <div class="section-label">Contacto</div>
      <h2 class="section-title">Conectar</h2>
      <p class="contacto-tagline" id="contacto-tagline"></p>
      <div class="contacto-links" id="contacto-links"></div>
    </div>
  </section>

  <footer>
    <span class="footer-name" id="footer-name"></span>
    <span class="footer-copy" id="footer-origin"></span>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <button class="lightbox-prev" onclick="lightboxNav(-1)">‹</button>
      <img id="lightbox-img" src="" alt="" />
      <button class="lightbox-next" onclick="lightboxNav(1)">›</button>
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>
  </div>

  <script>
  // ── Render from config ───────────────────────────────────────

  // Hero
  document.getElementById('hero-ornament').textContent = SITE_CONFIG.tagline;
  const nameParts = SITE_CONFIG.artistName.split(' ');
  document.getElementById('hero-name').innerHTML = `${nameParts[0]}<span>${nameParts.slice(1).join(' ')}</span>`;
  document.getElementById('hero-subtitle').textContent = SITE_CONFIG.subtitle;
  document.getElementById('hero-tagline').textContent = SITE_CONFIG.heroText;
  document.getElementById('hero-scroll').textContent = SITE_CONFIG.scrollLabel;
  document.getElementById('hero-origin').textContent = SITE_CONFIG.origin;
  document.getElementById('nav-logo-text').textContent = SITE_CONFIG.artistName;

  // Bio
  document.getElementById('bio-quote').textContent = `"${SITE_CONFIG.bioQuote}"`;
  document.getElementById('bio-origin-text').textContent = SITE_CONFIG.bioOriginText;
  document.getElementById('bio-paragraphs').innerHTML = SITE_CONFIG.bioParagraphs.map(p => `<p>${p}</p>`).join('');

  // Disciplines
  document.getElementById('disciplines-grid').innerHTML = SITE_CONFIG.disciplines.map(d => `
    <div class="discipline-card">
      <div class="discipline-number">${d.number}</div>
      <h3 class="discipline-title">${d.title}</h3>
      <p class="discipline-desc">${d.description}</p>
      <div class="discipline-works">
        <div class="discipline-works-label">Obras destacadas</div>
        <ul>${d.works.map(w => `<li>${w}</li>`).join('')}</ul>
      </div>
    </div>
  `).join('');

  // Reconocimientos
  document.getElementById('logros-grid').innerHTML = SITE_CONFIG.reconocimientos.map(r => `
    <div class="logro-item">
      <div class="logro-year">${r.year}</div>
      <div class="logro-title">${r.title}</div>
      <div class="logro-desc">${r.description}</div>
    </div>
  `).join('');

  // Gallery with filters
  const disciplines = ['Todos', ...new Set(SITE_CONFIG.gallery.map(g => g.discipline))];
  const types = { pieza: 'Pieza', expo: 'Exposición', premio: 'Premio' };

  document.getElementById('galeria-filters').innerHTML = disciplines.map((d, i) =>
    `<button class="filter-btn ${i === 0 ? 'active' : ''}" onclick="filterGallery('${d}', this)">${d}</button>`
  ).join('');

  function renderGallery(filter) {
    const items = filter === 'Todos' ? SITE_CONFIG.gallery : SITE_CONFIG.gallery.filter(g => g.discipline === filter);
    document.getElementById('galeria-grid').innerHTML = items.map((item, idx) => `
      <div class="galeria-item" onclick="openLightbox(${SITE_CONFIG.gallery.indexOf(item)}, 0)">
        <img src="${item.coverImage}" alt="${item.title}" loading="lazy" onerror="this.style.display='none'" />
        <div class="galeria-item-overlay">
          <div class="galeria-item-tag">${item.discipline} · ${types[item.type] || item.type}</div>
          <div class="galeria-item-title">${item.title}</div>
          <div class="galeria-item-desc">${item.description}</div>
        </div>
      </div>
    `).join('');
  }

  renderGallery('Todos');

  function filterGallery(discipline, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(discipline);
  }

  // Lightbox
  let currentItem = 0, currentImg = 0;

  function openLightbox(itemIdx, imgIdx) {
    currentItem = itemIdx;
    currentImg = imgIdx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const item = SITE_CONFIG.gallery[currentItem];
    document.getElementById('lightbox-img').src = item.images[currentImg];
    document.getElementById('lightbox-img').alt = item.title;
    document.getElementById('lightbox-caption').textContent = `${item.title} — ${item.description} (${currentImg + 1}/${item.images.length})`;
  }

  function lightboxNav(dir) {
    const item = SITE_CONFIG.gallery[currentItem];
    currentImg = (currentImg + dir + item.images.length) % item.images.length;
    updateLightbox();
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lightboxNav(1);
      if (e.key === 'ArrowLeft') lightboxNav(-1);
    }
  });

  // Contact
  document.getElementById('contacto-tagline').textContent = SITE_CONFIG.contactTagline;
  document.getElementById('contacto-links').innerHTML = `
    <a href="${SITE_CONFIG.instagram}" target="_blank" class="contacto-link">
      <span class="contacto-link-icon">📷</span>
      <span class="contacto-link-label">Instagram</span>
    </a>
    <a href="${SITE_CONFIG.facebook}" target="_blank" class="contacto-link">
      <span class="contacto-link-icon">📘</span>
      <span class="contacto-link-label">Facebook</span>
    </a>
    <a href="mailto:${SITE_CONFIG.email}" class="contacto-link">
      <span class="contacto-link-icon">✉️</span>
      <span class="contacto-link-label">Correo</span>
    </a>
  `;

  // Footer
  document.getElementById('footer-name').textContent = `${SITE_CONFIG.artistName} — ${SITE_CONFIG.tagline}`;
  document.getElementById('footer-origin').textContent = SITE_CONFIG.origin;

  // ── Scroll reveal ────────────────────────────────────────────
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // ── Hamburger ────────────────────────────────────────────────
  const toggle = document.getElementById('navToggle');
  const drawer = document.getElementById('navDrawer');
  toggle.addEventListener('click', () => {
    toggle.classList.toggle('open');
    drawer.classList.toggle('open');
    document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : '';
  });
  function closeDrawer() {
    toggle.classList.remove('open');
    drawer.classList.remove('open');
    document.body.style.overflow = '';
  }
  </script>

</body>
</html>
